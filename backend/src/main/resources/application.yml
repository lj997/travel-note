server:
  port: 8080

spring:
  application:
    name: travel-note
  
  datasource:
    url: jdbc:mysql://localhost:3306/travel_note?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: test
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  web:
    resources:
      static-locations: classpath:/static/, file:uploads/

file:
  upload:
    path: uploads/
    max-size: 52428800
    allowed-types: image/jpeg,image/png,image/gif,image/webp

jwt:
  secret: travelNoteJwtSecretKeyMustBeVeryLongAtLeast256BitsForSecurity
  expiration: 86400000

logging:
  level:
    com.travelnote: DEBUG
    org.springframework.security: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
